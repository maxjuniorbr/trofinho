name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.3.1 # 34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@v4.4.0 # 49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm test

  schema-drift:
    name: Schema drift check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4.3.1 # 34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@v4.4.0 # 49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: supabase/setup-cli@v1.6.0 # b60b5899c73b63a2d2d651b1e90db8d4c9392f51
        with:
          version: latest

      - name: Regenerate types and check for drift
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          npx supabase link --project-ref "$SUPABASE_PROJECT_REF"
          npm run db:types
          if ! git diff --exit-code src/types/database.types.ts; then
            echo "::error::database.types.ts is stale. Run 'npm run db:types' and commit the result."
            exit 1
          fi
