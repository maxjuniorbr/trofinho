appId: com.maxjuniorbr.trofinho
name: 'Criar conta e família – fluxo feliz'
---
# Generate a unique e-mail for this run: maestro.<timestamp>@trofinho.dev
# Accounts accumulate in the DB — bulk-delete periodically via admin API.
- evalScript: ${output.testEmail = 'maestro.' + Date.now() + '@trofinho.dev'}

# Kill the app, handle Expo dev-client screens, and wait for the login screen.
- runFlow:
    file: _launch-app.yaml

# === Passo 1: Tela de login → ir para cadastro ===
- tapOn: 'Criar conta'

# === Passo 2: Cadastro de conta (e-mail + senha) ===
- extendedWaitUntil:
    visible: 'Campo de nome'
    timeout: 15000
- tapOn: 'Campo de nome'
- inputText: 'Admin Maestro'
- tapOn: 'Campo de e-mail'
- inputText: '${output.testEmail}'
- tapOn: 'Campo de senha'
- inputText: '${MAESTRO_REGISTER_PASSWORD}'
- hideKeyboard
- tapOn: 'Continuar'

# === Passo 3: Onboarding (configurar família) ===
# O app navega automaticamente para onboarding após o cadastro, com nome pré-preenchido.
- extendedWaitUntil:
    visible: 'Campo de nome da família'
    timeout: 20000
- tapOn: 'Campo de nome da família'
- inputText: 'Familia Maestro'
# Admin name is pre-filled from the register step — no need to edit.
- hideKeyboard
- tapOn: 'Criar família'

# === Asserção final: tela inicial do admin ===
- extendedWaitUntil:
    visible: 'Início'
    timeout: 30000
- assertVisible: 'Início'
