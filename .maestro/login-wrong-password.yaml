appId: com.maxjuniorbr.trofinho
name: 'Login – senha incorreta'
---
# Kill the app, handle Expo dev-client screens, and wait for the login screen.
- runFlow:
    file: _launch-app.yaml

# Valid email format + intentionally wrong password (>= 8 chars to pass client-side validation).
- tapOn: 'Campo de e-mail'
- inputText: '${MAESTRO_EMAIL}'
- tapOn: 'Campo de senha'
- inputText: 'SenhaErrada123'
- hideKeyboard
- tapOn: 'Entrar'

# Wait for the server error — network round-trip may take a few seconds.
- extendedWaitUntil:
    visible: 'E-mail ou senha incorretos.'
    timeout: 15000

# Confirm we are still on the login screen and did not navigate forward.
- assertVisible: 'Campo de e-mail'
- assertNotVisible: 'Início'
