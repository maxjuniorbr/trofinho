appId: com.maxjuniorbr.trofinho
name: 'Login – fluxo feliz'
---
# Kill the app, handle Expo dev-client screens, and wait for the login screen.
- runFlow:
    file: _launch-app.yaml

# Fill in credentials via environment variables.
- tapOn: 'Campo de e-mail'
- inputText: '${MAESTRO_EMAIL}'
- tapOn: 'Campo de senha'
- inputText: '${MAESTRO_PASSWORD}'
- hideKeyboard
- tapOn: 'Entrar'

# Assert login succeeded: login form disappears and home screen loads.
- extendedWaitUntil:
    notVisible: 'Campo de e-mail'
    timeout: 20000
- assertVisible: 'Início'
