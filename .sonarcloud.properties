# ─── SonarCloud configuration ────────────────────────────────────────────────
# SonarCloud AutoScan reads this file from the repo root on every push.
# Docs: https://docs.sonarcloud.io/advanced-setup/analysis-parameters/
# ─────────────────────────────────────────────────────────────────────────────

# ── Analysis scope ────────────────────────────────────────────────────────────
# Exclude generated/snapshot artefacts from all analysis (issues + coverage).
# - supabase/schema.sql  : full-schema snapshot regenerated by Supabase CLI
# - supabase/migrations/ : raw SQL DDL files — can't use string constants
#   (plsql:S1192 repeated literals are unavoidable in migration DDL)
sonar.exclusions=supabase/schema.sql,supabase/migrations/**

# ── Duplication (CPD) scope ───────────────────────────────────────────────────
# Exclude the same paths from copy-paste detection.
# Migrations intentionally repeat DDL patterns across files; flagging them
# as duplicates produces noise without actionable signal.
sonar.cpd.exclusions=supabase/schema.sql,supabase/migrations/**

# ── HTML analyzer ─────────────────────────────────────────────────────────────
# Restrict the HTML analyzer to real HTML files only.
# Without this, SonarCloud mis-parses JSX syntax in .tsx files as HTML and
# raises false-positive HTML rule violations.
sonar.html.file.suffixes=.html,.xhtml,.htm
