# ─── SonarCloud configuration ────────────────────────────────────────────────
# SonarCloud AutoScan reads this file from the repo root on every push.
# Docs: https://docs.sonarcloud.io/advanced-setup/analysis-parameters/
# ─────────────────────────────────────────────────────────────────────────────

# ── Analysis scope ────────────────────────────────────────────────────────────
# Exclude generated/snapshot artefacts and non-source directories from all
# analysis (issues + coverage). This keeps the NCLOC count within the free tier.
#
# - supabase/migrations/ : raw SQL DDL — repeated literals unavoidable
# - supabase/seed.sql    : SQL seed data
# - src/types/database.types.ts : generated from Supabase CLI (db:types)
# - android/             : generated native Android project (Java/Kotlin/Gradle)
# - assets/              : binary assets (images, fonts — not source code)
# - dist/                : Expo/Metro build output
# - temp/                : ad-hoc utility scripts, not production code
# - scripts/             : CI/build helper scripts
# - .maestro/            : Maestro E2E test flows (YAML, not TypeScript)
# - .agents/             : Copilot agent/skill definitions (Markdown/YAML)
sonar.exclusions=\
  supabase/migrations/**,\
  supabase/seed.sql,\
  src/types/database.types.ts,\
  android/**,\
  assets/**,\
  dist/**,\
  temp/**,\
  scripts/**,\
  .maestro/**,\
  .agents/**

# ── Duplication (CPD) scope ───────────────────────────────────────────────────
# Exclude the same paths from copy-paste detection.
# - Migrations intentionally repeat DDL patterns across files
# - Test files inherently repeat boilerplate (mocks, helpers) across suites;
#   excluding them is standard practice to avoid false-positive duplication alerts
# - src/constants/colors.ts: light/dark palettes mirror each other by design
#   (declarative theme tokens — values differ, shape is intentionally identical)
# - src/constants/shadows.ts: heroPalette/heroPaletteLight pair follows the
#   same swap-safe shape contract
sonar.cpd.exclusions=supabase/migrations/**,supabase/seed.sql,test/**,src/constants/colors.ts,src/constants/shadows.ts

# ── HTML analyzer ─────────────────────────────────────────────────────────────
# Restrict the HTML analyzer to real HTML files only.
# Without this, SonarCloud mis-parses JSX syntax in .tsx files as HTML and
# raises false-positive HTML rule violations.
sonar.html.file.suffixes=.html,.xhtml,.htm
