# ─── SonarCloud configuration ────────────────────────────────────────────────
# SonarCloud AutoScan reads this file from the repo root on every push.
# CI also uses this via SonarSource/sonarqube-scan-action.
# Docs: https://docs.sonarcloud.io/advanced-setup/analysis-parameters/
# ─────────────────────────────────────────────────────────────────────────────

sonar.projectKey=maxjuniorbr_trofinho
sonar.organization=maxjuniorbr
sonar.projectVersion=1.0.0

# ── Coverage ──────────────────────────────────────────────────────────────────
# Vitest generates lcov.info in coverage/; CI uploads it to SonarCloud.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Analysis scope ────────────────────────────────────────────────────────────
# Exclude generated files, build artifacts, non-source directories, and
# tooling configs from all analysis (issues + NCLOC count).
#
# - supabase/migrations/       : raw SQL DDL — repeated literals unavoidable
# - supabase/seed.sql          : SQL seed data
# - supabase/functions/*/index.ts : Deno entry points — thin wrappers that
#     re-export from handler.ts and use Deno.serve / https:// imports that
#     Sonar cannot resolve. The actual logic in handler.ts IS analyzed.
# - src/types/database.types.ts : generated from Supabase CLI (db:types)
# - android/                   : generated native Android project
# - assets/                    : binary assets (images, fonts)
# - dist/                      : Expo/Metro build output
# - temp/                      : ad-hoc utility scripts, not production code
# - scripts/                   : CI/build helper scripts
# - .maestro/                  : Maestro E2E test flows (YAML)
# - .agents/                   : Copilot agent/skill definitions
# - vitest.config.ts           : test runner config — no product logic
# - eslint.config.mjs          : linter config — no product logic
# - metro.config.js            : bundler config — no product logic
# - app.config.js              : Expo build config — no product logic
sonar.exclusions=\
  supabase/migrations/**,\
  supabase/seed.sql,\
  supabase/functions/*/index.ts,\
  src/types/database.types.ts,\
  android/**,\
  assets/**,\
  dist/**,\
  temp/**,\
  scripts/**,\
  .maestro/**,\
  .agents/**,\
  vitest.config.ts,\
  eslint.config.mjs,\
  metro.config.js,\
  app.config.js

# ── Test sources ──────────────────────────────────────────────────────────────
# Mark test files so Sonar counts them separately from production NCLOC.
sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  test/**

# ── Duplication (CPD) scope ───────────────────────────────────────────────────
# Exclude paths from copy-paste detection where duplication is intentional.
#
# - supabase/migrations/: DDL patterns repeat across migration files
# - test/**: test boilerplate (mocks, helpers) repeats across suites
# - src/constants/colors.ts: light/dark palettes mirror by design
# - src/constants/shadows.ts: heroPalette/heroPaletteLight swap-safe pair
#
# Admin/child screen pairs — intentionally mirror the same UI layout and
# StyleSheet definitions for role-specific views of the same data:
# - balances, historico, perfil, redemptions, index (home), tasks
# - auth screens (login/register share field layout)
#
# Form sheets — prize-form-sheet and task-form-sheet share the
# BottomSheetModal + ScrollView shell pattern by design.
#
# Profile components — cards and sheets share form layout patterns.
#
# Edge function entry points (index.ts) are already excluded from analysis.
# Handler files (handler.ts) remain in CPD — the ~20 lines of shared HTTP
# parsing boilerplate between register-child and send-push-notification is
# accepted (independent Deno deployments, cannot share modules).
sonar.cpd.exclusions=\
  supabase/migrations/**,\
  supabase/seed.sql,\
  test/**,\
  src/constants/colors.ts,\
  src/constants/shadows.ts,\
  app/(admin)/balances/**,\
  app/(child)/balance.tsx,\
  app/(child)/historico.tsx,\
  app/(admin)/perfil.tsx,\
  app/(child)/perfil.tsx,\
  app/(admin)/redemptions/**,\
  app/(child)/redemptions/**,\
  app/(admin)/index.tsx,\
  app/(child)/index.tsx,\
  app/(auth)/login.tsx,\
  app/(auth)/register.tsx,\
  app/(admin)/tasks/**,\
  app/(child)/tasks/**,\
  src/components/profile/**,\
  src/components/prizes/prize-form-sheet.tsx,\
  src/components/tasks/task-form-sheet.tsx

# ── HTML analyzer ─────────────────────────────────────────────────────────────
# Restrict to real HTML files only. Without this, SonarCloud mis-parses JSX
# syntax in .tsx files as HTML and raises false-positive violations.
sonar.html.file.suffixes=.html,.xhtml,.htm
